services:
  root-config:
    image: cybersio/root-config:${VERSION}
    build:
      context: ../root-config
    environment:
      - PORT=9000
      - NODE_ENV=production
      - HOST_IP=${CYB_MF_HOST_IP}
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./logs/root-config:/var/log/nginx

  container-cybersio:
    image: cybersio/root-container:${VERSION}
    build:
      context: ../root-container
    environment:
      - PORT=9001
      - NODE_ENV=production
      - HOST_IP=${CYB_MF_HOST_IP}
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./logs/root-container:/var/log/nginx

  shared-lib:
    image: cybersio/shared-lib:${VERSION}
    build:
      context: ../shared-lib
    environment:
      - PORT=9002
      - NODE_ENV=production
      - HOST_IP=${CYB_MF_HOST_IP}
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./logs/shared-lib:/var/log/nginx

  tb-cybersio-ui:
    image: cybersio/tb-cybersio-ui:${VERSION}
    build:
      context: ../tb-cybersio-ui
    environment:
      - PORT=9004
      - NODE_ENV=production
      - HOST_IP=${CYB_MF_HOST_IP}
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./logs/tb-cybersio-ui:/var/log/nginx

  tb-thirdparty-ui:
    image: cybersio/tb-thirdparty-ui:${VERSION}
    build:
      context: ../tb-thirdParty-ui
    environment:
      - PORT=9005
      - NODE_ENV=production
      - HOST_IP=${CYB_MF_HOST_IP}
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./logs/tb-thirdparty-ui:/var/log/nginx

  tb-rbac:
    image: cybersio/tb-rbac:${VERSION}
    build:
      context: ../tb-rbac
    environment:
      - PORT=9003
      - NODE_ENV=production
      - HOST_IP=${CYB_MF_HOST_IP}
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./logs/tb-rbac:/var/log/nginx
 
  dist-api-gateway:
    image: cybersio/dist-api-gateway:${VERSION}
    build:
      context: .
    environment:
      PORT: 9007
      NODE_ENV: development
      PGUSER: ${PGUSER}
      PGHOST: ${PGHOST}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE}
      PGPORT: ${PGPORT}
      IAM_BASE_URL: ${IAM_BASE_URL}
      IAM_REALM: ${IAM_REALM}
      IAM_CLIENT_ID: ${IAM_CLIENT_ID}
      IAM_CLIENT_SECRET: ${IAM_CLIENT_SECRET}
      IAM_REDIRECT_URI: ${IAM_REDIRECT_URI}
      GATEWAY_NAME: cybersio-api-gateway
      GATEWAY_VERSION: 1.0.0
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 5000
      LOG_LEVEL: info
      LOG_FILE: logs/gateway.log
      CACHE_TTL: 300
      CACHE_MAX_SIZE: 1000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      RBAC_SERVICE_URL: ${RBAC_SERVICE_URL}
      TBSIEM_SERVICE_URL: ${TBSIEM_SERVICE_URL}
      TBIAM_SERVICE_URL: ${TBIAM_SERVICE_URL}
      TBUEBA_SERVICE_URL: ${TBUEBA_SERVICE_URL}
      SYSLOG_SERVICE_URL: ${SYSLOG_SERVICE_URL}
      TBPATCH_SERVICE_URL: ${TBPATCH_SERVICE_URL}
      TBVA_SERVICE_URL: ${TBVA_SERVICE_URL}
      HEALTH_CHECK_INTERVAL: 30000
      HEALTH_CHECK_TIMEOUT: 5000
      CIRCUIT_BREAKER_THRESHOLD: 5
      CIRCUIT_BREAKER_TIMEOUT: 60000
      CIRCUIT_BREAKER_RESET_TIMEOUT: 30000
      LOAD_BALANCE_STRATEGY: round-robin
      MAX_RETRIES: 3
      RETRY_DELAY: 1000
      JWT_SECRET: supersecretkey
      JWT_EXPIRES_IN: 150m
      HTTPS_CERT: /opt/certificate.pem
      HTTPS_KEY: /opt/key.pem
      LICENSE_HMAC_SECRET: your_super_secret_key_here
      TBSIEM_PRODUCT_ID: ${TBSIEM_PRODUCT_ID}
      TBPAM_PRODUCT_ID: ${TBPAM_PRODUCT_ID}
      TBIAM_PRODUCT_ID: ${TBIAM_PRODUCT_ID}
      TBUEBA_PRODUCT_ID: ${TBUEBA_PRODUCT_ID}
      TBSYSLOG_PRODUCT_ID: ${TBSYSLOG_PRODUCT_ID}
      HOST_IP: ${CYB_MS_HOST_IP}
      SMTP_LOCAL_SERVER: ${SMTP_LOCAL_SERVER}
      SMTP_SERVICE: ${SMTP_SERVICE}
      SMTP_SERVICE_PORT: ${SMTP_SERVICE_PORT}
      SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_ALERT_SENDER_EMAIL: ${SMTP_ALERT_SENDER_EMAIL}
      ALERT_RECIPIENT_EMAIL: ${ALERT_RECIPIENT_EMAIL}
      TBSIEM_INDEXER: ${TBSIEM_INDEXER}
      USERNAME_SIEM: ${USERNAME_SIEM}
      PASSWORD_SIEM: ${PASSWORD_SIEM}
      SIEM_RULE_LEVEL: ${SIEM_RULE_LEVEL}
      SIEM_NOTIFICATION_INTERVAL: ${SIEM_NOTIFICATION_INTERVAL}
      EMAIL_UEBA_ENABLED: ${EMAIL_UEBA_ENABLED}
      EMAIL_SIEM_ENABLED: ${EMAIL_SIEM_ENABLED}
      NAME: ${NAME}
      TBITSM_UEBA_INTEGRATION: ${TBITSM_UEBA_INTEGRATION}
      TBITSM_SIEM_INTEGRATION: ${TBITSM_SIEM_INTEGRATION}
      ITSM_BASE_URL: ${ITSM_BASE_URL}
      TBITSM_USERNAME: ${TBITSM_USERNAME}
      TBITSM_PASSWORD: ${TBITSM_PASSWORD}
      TBITSM_ORG_ID: ${TBITSM_ORG_ID}
      TBITSM_CALLER_ID: ${TBITSM_CALLER_ID}
      TBITSM_SERVICE_ID: ${TBITSM_SERVICE_ID}
      TBITSM_SERVICESUBCATEGORY_ID: ${TBITSM_SERVICESUBCATEGORY_ID}
      TBITSM_FUNCTIONALCI_ID: ${TBITSM_FUNCTIONALCI_ID}
      CYBERSIO_VERSION: v${CYBERSIO_VERSION}
    network_mode: host
    restart: unless-stopped

  tb-rbac-backend:
    image: cybersio/tb-rbac-backend:${VERSION}
    build:
      context: .
    environment:
      PORT: 9006
      NODE_ENV: development
      CONFIG_PATH: config.env
      DB_HOST: ${RBAC_DB_HOST}
      DB_PORT: ${RBAC_DB_PORT}
      DB_NAME: ${RBAC_DB_NAME}
      DB_USER: ${RBAC_DB_USER}
      DB_PASSWORD: ${RBAC_DB_PASSWORD}
      DB_DIALECT: postgres
      JWT_SECRET: supersecretkey
      JWT_ALGORITHM: HS256
      MAIN_BACKEND_URL: ${RBAC_MAIN_BACKEND_URL}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      LOG_LEVEL: info
      LOG_FILE: logs/auth-service.log
      CACHE_TTL: 300
      POLICY_CACHE_SIZE: 1000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      HTTPS_CERT: /opt/certificate.pem
      HTTPS_KEY: /opt/key.pem
      HOST_IP: ${CYB_MS_HOST_IP}
    network_mode: host
    restart: unless-stopped
