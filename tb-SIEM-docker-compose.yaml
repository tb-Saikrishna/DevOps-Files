services:
  tb-siem-ui:
    image: tb-siem-ui
    build:
      context: ./Frontend/tb-siem-ui
    environment:
      - PORT=8001
      - NODE_ENV=production
      - HOST_IP=192.168.0.137
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./Frontend/tb-siem-ui/logs/tb-siem-ui:/var/log/nginx
      - ./certs/certificate.pem:/opt/certificate.pem
      - ./certs/key.pem:/opt/key.pem
      - /etc/hosts:/etc/hosts:ro

  tbsiem-backend:
    image: tbsiem-backend
    build:
      context: ./Backend/tbsiem-backend
      dockerfile: Dockerfile
    container_name: tbsiem-backend
    ports:
      - "8002:8002"
    environment:
      NODE_ENV: development
      PORT: 5001
      TBSIEM_BASE_URL: https://192.168.0.20:8003
      INTERNAL_TOKEN: f3d9b2a4c7e84f1d9a6c2b5e1f3a7d9c4e8b2f1a6c7d3e9b1a4f6c2d8e1b3a7
      PEERS: https://192.168.0.20:5001,https://192.168.0.32:5001
      PGHOST: '["192.168.0.180","192.168.0.32"]'
      PGUSER: tbsiem_user
      PGDATABASE: cybersio
      PGPASSWORD: 1234
      PGPORT: 5432
      SSL_KEY_PATH: /root/Backend/tbsiem-backend/ssl/server.key
      SSL_CERT_PATH: /root/Backend/tbsiem-backend/ssl/server.crt
      DOWNLOADS_DIR: /root/downloadsing/reports
      SMTP_LOCAL_SERVER: false
      SMTP_SERVICE: smtp.office365.com
      SMTP_SERVICE_PORT: 587
      SMTP_SENDER_NAME: Techbridge
      SMTP_PASSWORD: "yxhqndzxsnmzbcjn"
      SMTP_ALERT_SENDER_EMAIL: "support.tkt@tech-bridge.biz"
      EMAIL_EPS_ENABLED: true
      EPS_ALERT_TO: "himanshu.verma@tech-bridge.biz"
      STORAGE_LIMIT_GB: 0.28
      MONITOR_TYPE: STORAGE
      VERSION: 2.0.1
    restart: unless-stopped
    volumes:
      - ./certs/certificate.pem:/opt/certificate.pem
      - ./certs/key.pem:/opt/key.pem
      - /etc/hosts:/etc/hosts:ro
      - ./scripts/backend-entrypoint.sh:/entrypoint.sh:ro
      - ssl-backend-data:/root/Backend/tbsiem-backend/ssl

  tbsiem-tool:
    image: tbsiem-tool
    build:
      context: ./Tool/tbsiem-tool
      dockerfile: Dockerfile
    container_name: tbsiem-tool
    ports:
      - "8003:8003"
      - "3443:3443"
    environment:
      HTTPS: true
      SSL_PORT: 8003
      NODE_ENV: development
      JWT_SECRET: tbSecretKey123
      SERVER_IP: '["https://192.168.0.185:9200"]'
      OPENSEARCH_INDEX_NAME: '*-alerts-*'
      OPENSEARCH_INDEX_PATTERN: 'wazuh-alerts-'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: admin
      TBSIEM_CLIENT_USERNAME: wazuh-wui
      TBSIEM_CLIENT_PASSWORD: wazuh-wui
      TBSIEM_CLIENT_API_URLS: https://192.168.0.185:55000
      WAZUH_VULNERABILITIES: wazuh-states-vulnerabilities-*
      SSL_KEY_PATH: /root/Tool/tbsiem-tool/ssl/server.key
      SSL_CERT_PATH: /root/Tool/tbsiem-tool/ssl/server.crt
      VISUALIZATION_INDEX: visualizations
      DASHBOARD_INDEX: dashboards
      CUSTOM_DASHBOARD_INDICES: '["tbsiem-alerts-*"]'
      STATISTICS_INDEX: "tbsiem-statistics-*"
      RULE_IDS_TO_INCLUDE_FOR_THREAT_HUNTING: 60106,67023,67024,67028,61104,60642,61102,60137,60132
      PGHOST: '["192.168.0.180","192.168.0.32"]'
      PGUSER: tbsiem_user
      PGDATABASE: cybersio
      PGPASSWORD: 1234
      PGPORT: 5432
      PG_STATEMENT_TIMEOUT: 60000
      DB_MAX_CONNECTIONS: 50
      DB_IDLE_TIMEOUT: 30000
      DB_CONNECTION_TIMEOUT: 10000
      DB_ACQUIRE_TIMEOUT: 30000
      API_GATEWAY_BASE_URL: https://192.168.0.19:5002
      SOAR_FILTERS: ""
      SOAR_BASE_URL: https://192.168.0.34:8001
      SOAR_API_KEY: 9a8d7a9d7a9d
      SOAR_DATA_INTERVAL_IN_MINUT: 1
      PDF_PRIMARY_LOGO_PATH: /root/Tool/tbsiem-tool/pdfPrimaryLogo.png
      SMTP_LOCAL_SERVER: false
      SMTP_SERVICE: smtp.office365.com
      SMTP_SERVICE_PORT: 587
      SMTP_SENDER_NAME: Techbridge
      SMTP_PASSWORD: "yxhqndzxsnmzbcjn"
      SMTP_ALERT_SENDER_EMAIL: "support.tkt@tech-bridge.biz"
      EMAIL_EPS_ENABLED: true
      EPS_ALERT_TO: "himanshu.verma@tech-bridge.biz"
      VERSION: 2.0.1
    restart: unless-stopped
    volumes:
      - ./certs/certificate.pem:/opt/certificate.pem
      - ./certs/key.pem:/opt/key.pem
      - /etc/hosts:/etc/hosts:ro
      - ./scripts/tool-entrypoint.sh:/entrypoint.sh:ro
      - ssl-tool-data:/root/Tool/tbsiem-tool/ssl

  kafka:
    image: apache/kafka:3.9.1
    container_name: ingestion-kafka
    user: "0:0"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    volumes:
      - ./Connector/tbsiem-connector/tmp/kraft-combined-logs:/tmp/kraft-combined-logs
      - ./certs/certificate.pem:/opt/certificate.pem
      - ./certs/key.pem:/opt/key.pem
      - /etc/hosts:/etc/hosts:ro

  kafka-init:
    image: apache/kafka:3.9.1
    container_name: ingestion-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/init-topics.sh"]
    volumes:
      - ./Connector/tbsiem-connector/docker/kafka/init-topics.sh:/scripts/init-topics.sh:ro
      - ./certs/certificate.pem:/opt/certificate.pem
      - ./certs/key.pem:/opt/key.pem
      - /etc/hosts:/etc/hosts:ro
    restart: "no"

  postgres:
    image: postgres:16
    container_name: cybersio-postgres
    environment:
      - POSTGRES_DB=cybersio
      - POSTGRES_USER=cyber
      - POSTGRES_PASSWORD=cyber
    ports:
      - "5432:5432"
    volumes:
      - ./Connector/tbsiem-connector/var/lib/postgresql/data:/var/lib/postgresql/data
      - ./certs/certificate.pem:/opt/certificate.pem
      - ./certs/key.pem:/opt/key.pem
      - /etc/hosts:/etc/hosts:ro

  redis:
    image: redis:7-alpine
    container_name: cybersio-redis
    ports:
      - "6380:6380"
    volumes:
      - ./Connector/tbsiem-connector/redis-data:/data
      - /etc/hosts:/etc/hosts:ro

volumes:
  ssl-backend-data:
  ssl-tool-data:
